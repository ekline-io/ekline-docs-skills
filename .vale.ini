# Optional: Direct Vale integration for editor-level style checking.
# The style-guide and terminology skills use their own Python scripts instead.
# To use Vale directly: brew install vale && vale sync && vale docs/
StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = EkLine

Packages = write-good

[*.md]
BasedOnStyles = Vale, write-good
write-good.E-Prime = NO
write-good.TooWordy = NO
